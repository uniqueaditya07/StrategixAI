# Phase 8 Firebase setup.
# Copy this file to .streamlit/secrets.toml and fill values from Firebase Console.

[firebase]
apiKey = "your-web-api-key"
authDomain = "your-project-id.firebaseapp.com"
projectId = "your-project-id"
storageBucket = "your-project-id.appspot.com"
messagingSenderId = "your-sender-id"
appId = "your-web-app-id"
measurementId = ""

# Use one Admin SDK option:
# 1. Paste the full service account JSON as a single-line string:
service_account_json = ""

# 2. Or point to a local service account file outside version control:
service_account_path = ""

# 3. Or use Application Default Credentials in deployed environments.

# Top-level auth helper URLs used to avoid Streamlit component iframe origins.
# These can also be set as STRATEGIXAI_AUTH_HELPER_URL and STRATEGIXAI_APP_URL.
auth_helper_url = "http://127.0.0.1:5000"
app_url = "http://127.0.0.1:8502"

# Optional: show Firebase auth debug panels during local troubleshooting.
auth_debug = false
